<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Yemen Ads</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .box { border: 2px solid #22c55e; padding: 20px; margin: 20px; border-radius: 15px; background: #1e293b; }
        button { background: #22c55e; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        h1 { color: #22c55e; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Pulse Yemen</h1>
        <p>جاري تجهيز الإعلان...</p>
        <button onclick="showAd()">مشاهدة إعلان (Yolzex_)</button>
    </div>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener('deviceready', function() {
            // تهيئة الإعلانات
            // الرقم 6104585 هو Game ID الخاص بك
            unityads.initialize("6104585", true); // true تعني وضع الاختبار حالياً
            console.log("Unity Ads Initialized");
        }, false);

        function showAd() {
            // Yolzex_ هو اسم الوحدة التي أنشأتها
            unityads.show("Yolzex_");
        }
    </script>
</body>
</html>
